name: AI DevOps Copilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check preprocessor imports
        run: |
          python -c "from backend.core.preprocessor import normalize, to_dataframe; print('Preprocessor OK')"

      - name: Check decision engine imports
        run: |
          python -c "from backend.core.decision_engine import execute; print('Decision Engine OK')"

      - name: Check FastAPI app loads
        run: |
          python -c "from backend.main import app; print('FastAPI OK')"
